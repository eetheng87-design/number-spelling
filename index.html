<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Rina Number Magic 1-20</title>
<style>
:root{
  --bg1:#120018;--bg2:#241147;--pink:#ff5ad9;--purple:#7b2cff;--cyan:#49d8ff;--gold:#ffd166;--green:#77ffb7;--red:#ff4d6d;--white:#fff7ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Trebuchet MS","Arial Rounded MT Bold",system-ui,sans-serif;color:var(--white);background:#120018}
body{
  background:
    radial-gradient(circle at 10% 15%,rgba(255,90,217,.45),transparent 28%),
    radial-gradient(circle at 85% 12%,rgba(73,216,255,.35),transparent 24%),
    radial-gradient(circle at 50% 110%,rgba(123,44,255,.62),transparent 48%),
    linear-gradient(135deg,#120018,#241147 48%,#060012);
}
body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.035) 0 2px,transparent 2px 72px),linear-gradient(100deg,transparent 0 42%,rgba(255,255,255,.12) 48%,transparent 58%);pointer-events:none;animation:lightMove 7s ease-in-out infinite alternate}
@keyframes lightMove{from{opacity:.45;filter:hue-rotate(0deg)}to{opacity:.9;filter:hue-rotate(28deg)}}
.app{position:relative;z-index:1;width:100vw;height:100dvh;padding:14px;display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:14px}
.card{border:1px solid rgba(255,255,255,.22);background:linear-gradient(155deg,rgba(255,255,255,.18),rgba(255,255,255,.07));box-shadow:0 22px 58px rgba(0,0,0,.36),inset 0 0 32px rgba(255,255,255,.06);backdrop-filter:blur(13px);border-radius:28px}
.stage{min-width:0;min-height:0;padding:18px;display:flex;flex-direction:column;overflow:hidden}
.side{position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding:8px}
.rina{width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:22px;filter:drop-shadow(0 0 24px rgba(255,90,217,.5));animation:floaty 3s ease-in-out infinite}
.speech{position:absolute;left:10px;right:10px;bottom:10px;padding:10px 11px;border-radius:18px;background:rgba(15,0,34,.74);border:1px solid rgba(255,255,255,.23);font-weight:900;font-size:13px;line-height:1.25;text-align:center;text-shadow:0 0 12px rgba(255,90,217,.8)}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.rina.attack{animation:rinaAttack .35s ease-in-out 1}.rina.hurt{animation:rinaHurt .45s ease-in-out 1}
@keyframes rinaAttack{0%,100%{transform:translateX(0)}45%{transform:translateX(-18px) scale(1.03)}}
@keyframes rinaHurt{0%,100%{filter:drop-shadow(0 0 24px rgba(255,90,217,.5))}50%{filter:drop-shadow(0 0 36px rgba(255,77,109,.95)) brightness(1.25)}}
.screen{display:none;height:100%;min-height:0}.screen.active{display:flex;flex-direction:column;min-height:0}
h1{margin:0;font-size:clamp(32px,5vw,62px);line-height:.95;text-shadow:0 0 16px var(--pink),0 0 38px var(--purple)}
.subtitle{margin:10px 0 0;font-size:18px;opacity:.94}.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:26px}
.mode{appearance:none;border:1px solid rgba(255,255,255,.24);border-radius:26px;min-height:165px;padding:22px;text-align:left;color:white;background:linear-gradient(145deg,rgba(255,90,217,.25),rgba(73,216,255,.14));box-shadow:0 16px 36px rgba(0,0,0,.26);cursor:pointer;font-weight:900}.mode:active{transform:scale(.98)}.mode .emoji{display:block;font-size:42px}.mode b{display:block;margin:8px 0;font-size:26px}.mode span{font-size:16px;opacity:.9;line-height:1.35}
.top{display:grid;grid-template-columns:auto 1fr auto auto;gap:9px;align-items:center;margin-bottom:10px}.pill{padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);font-weight:1000;white-space:nowrap;text-align:center}.titlePill{overflow:hidden;text-overflow:ellipsis}
button{border:0;border-radius:999px;padding:12px 17px;font-size:16px;font-weight:1000;color:white;background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 10px 25px rgba(0,0,0,.24),0 0 18px rgba(255,90,217,.25);cursor:pointer}button.secondary{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.24)}button.gold{background:linear-gradient(135deg,#ffd166,#ff7ac8);color:#2b033e}
.gameBody{flex:1;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:10px}
.path{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}.step{padding:7px 2px;border-radius:11px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);font-size:13px;font-weight:1000;text-align:center}.step.done{background:linear-gradient(135deg,var(--gold),var(--pink));color:#2b033e}
.battleRow{display:none;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}.fighter{min-width:0;padding:10px 12px;border-radius:20px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.18)}.fighterTitle{display:flex;justify-content:space-between;gap:6px;margin-bottom:7px;font-weight:1000;font-size:14px}.hpbar{height:16px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);overflow:hidden}.hp{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--gold));transition:.25s width}.monsterhp{background:linear-gradient(90deg,var(--red),var(--pink))}.monster{font-size:68px;line-height:1;text-align:center;filter:drop-shadow(0 0 22px rgba(73,216,255,.55))}.monster.boss{font-size:82px;filter:drop-shadow(0 0 30px rgba(255,77,109,.75))}.monster.hit{animation:monsterHit .33s ease-in-out 1}@keyframes monsterHit{0%,100%{transform:scale(1)}40%{transform:scale(.78) rotate(-7deg);filter:brightness(1.6)}}
.playArea{min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:10px}.prompt{font-size:18px;font-weight:900;opacity:.94}.number{width:min(270px,50vw);height:min(170px,24vh);min-height:105px;border-radius:32px;display:grid;place-items:center;font-size:clamp(76px,12vw,145px);font-weight:1000;background:radial-gradient(circle at 30% 22%,rgba(255,255,255,.36),transparent 27%),linear-gradient(140deg,rgba(255,90,217,.66),rgba(123,44,255,.82),rgba(73,216,255,.45));border:2px solid rgba(255,255,255,.34);box-shadow:0 0 34px rgba(255,90,217,.45),inset 0 0 34px rgba(255,255,255,.12);text-shadow:0 0 18px rgba(255,255,255,.72)}
.combo{min-height:26px;font-size:23px;font-weight:1000;color:var(--gold);text-shadow:0 0 12px var(--pink)}
.answerBar{display:grid;grid-template-columns:minmax(0,1fr) auto auto auto;gap:8px;align-items:center}input{min-width:0;width:100%;font-size:clamp(23px,3.2vw,34px);text-align:center;padding:12px 14px;border-radius:22px;border:2px solid rgba(255,255,255,.29);outline:none;color:white;background:rgba(0,0,0,.3);box-shadow:inset 0 0 18px rgba(255,255,255,.08);font-weight:1000;text-transform:lowercase}input:focus{border-color:var(--pink);box-shadow:0 0 20px rgba(255,90,217,.45)}.feedback{min-height:30px;font-size:20px;font-weight:1000;text-align:center;text-shadow:0 0 12px var(--pink);line-height:1.2}.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:5}.star{position:absolute;font-size:27px;animation:pop .9s ease-out forwards}@keyframes pop{0%{transform:translateY(0) scale(.35);opacity:0}20%{opacity:1}100%{transform:translateY(-125px) scale(1.35) rotate(40deg);opacity:0}}
@media (max-width:1024px){
  .app{padding:8px;gap:8px;grid-template-columns:minmax(0,1fr) 150px}.stage{padding:10px;border-radius:22px}.side{border-radius:22px}.rina{border-radius:16px}.speech{font-size:12px;padding:8px 7px;border-radius:14px}h1{font-size:clamp(29px,5vw,46px)}.subtitle{font-size:14px}.menu-grid{margin-top:14px;gap:10px}.mode{min-height:118px;padding:15px;border-radius:20px}.mode .emoji{font-size:31px}.mode b{font-size:21px}.mode span{font-size:13px}.top{gap:6px;margin-bottom:6px}.pill{font-size:13px;padding:7px 9px}button{font-size:14px;padding:10px 12px}.gameBody{gap:6px}.path{gap:4px}.step{font-size:11px;padding:5px 1px;border-radius:8px}.battleRow{gap:7px}.fighter{padding:7px;border-radius:16px}.fighterTitle{font-size:12px;margin-bottom:5px}.hpbar{height:11px}.monster{font-size:45px}.monster.boss{font-size:53px}.playArea{gap:6px}.prompt{font-size:15px}.combo{font-size:17px;min-height:20px}.number{width:min(190px,40vw);height:100px;min-height:86px;border-radius:23px;font-size:76px}.answerBar{gap:6px}input{font-size:24px;padding:9px 10px;border-radius:17px}.feedback{font-size:16px;min-height:22px}
}
@media (max-height:760px) and (min-width:721px){
  .app{padding:7px}.stage{padding:8px}.top{margin-bottom:4px}.gameBody{gap:5px}.mode{min-height:105px}.number{height:86px;min-height:76px;font-size:68px}.monster{font-size:38px}.monster.boss{font-size:44px}.fighter{padding:6px}.hpbar{height:10px}input{font-size:22px;padding:7px 9px}.feedback{font-size:15px;min-height:20px}.prompt{font-size:14px}.combo{font-size:16px;min-height:18px}button{padding:8px 10px}
}
@media (orientation:portrait) and (max-width:850px){
  html,body{overflow:auto}.app{height:auto;min-height:100dvh;grid-template-columns:1fr}.side{display:none}.stage{min-height:100dvh}.menu-grid{grid-template-columns:1fr}.answerBar{grid-template-columns:1fr 1fr 1fr}.answerBar input{grid-column:1/-1}.battleRow{grid-template-columns:1fr auto 1fr}.path{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <main class="stage card">
    <section id="menu" class="screen active">
      <div>
        <h1>Rina Number Magic</h1>
        <p class="subtitle">看数字 1–20，写出英文。没有练习模式，只保留闯关和打怪。</p>
      </div>
      <div class="menu-grid">
        <button class="mode" onclick="startGame('level')"><span class="emoji">⭐</span><b>Adventure Mode</b><span>从 1 到 20 顺序闯关，答对才前进。</span></button>
        <button class="mode" onclick="startGame('monster')"><span class="emoji">👾</span><b>Monster Battle</b><span>打怪、有血条、Combo、提示和 Boss 关。</span></button>
      </div>
      <p class="subtitle">例子：1 = one，8 = eight，15 = fifteen，20 = twenty。</p>
    </section>

    <section id="game" class="screen">
      <div class="top">
        <button class="secondary" onclick="goMenu()">← 首页</button>
        <div class="pill titlePill" id="modeName">Adventure Mode</div>
        <div class="pill">⭐ <span id="score">0</span></div>
        <div class="pill" id="stagePill" style="display:none">Stage <span id="stage">1</span></div>
      </div>
      <div class="gameBody">
        <div class="path" id="path"></div>
        <div>
          <div class="battleRow" id="battleArea">
            <div class="fighter"><div class="fighterTitle"><span>Rina</span><span id="rinaHpText">100/100</span></div><div class="hpbar"><div class="hp" id="rinaHp"></div></div></div>
            <div class="monster" id="monsterIcon">👾</div>
            <div class="fighter"><div class="fighterTitle"><span id="monsterName">Monster</span><span id="monsterHpText">3/3</span></div><div class="hpbar"><div class="hp monsterhp" id="monsterHp"></div></div></div>
          </div>
          <div class="playArea">
            <div class="combo" id="comboText"></div>
            <div class="prompt" id="prompt">这个数字的英文是什么？</div>
            <div class="number" id="numberBox">1</div>
          </div>
        </div>
        <div>
          <div class="answerBar">
            <input id="answer" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="type English here" onkeydown="if(event.key==='Enter') checkAnswer()" />
            <button onclick="speakCurrent()">🔊</button>
            <button class="gold" onclick="checkAnswer()">Attack</button>
            <button class="secondary" onclick="showHint()">Hint</button>
          </div>
          <div class="feedback" id="feedback"></div>
        </div>
      </div>
    </section>
  </main>
  <aside class="side card">
    <img id="rinaImg" class="rina" src="rina-happy.jpg" alt="Rina happy character" />
    <div class="speech" id="rinaSpeech">Hi! Ready? Let’s learn numbers!</div>
  </aside>
</div>
<script>
const words={1:'one',2:'two',3:'three',4:'four',5:'five',6:'six',7:'seven',8:'eight',9:'nine',10:'ten',11:'eleven',12:'twelve',13:'thirteen',14:'fourteen',15:'fifteen',16:'sixteen',17:'seventeen',18:'eighteen',19:'nineteen',20:'twenty'};
let mode='level',current=1,score=0,levelIndex=1,wrongCount=0,stage=1,combo=0,rinaHP=100,monsterHP=3,monsterMaxHP=3,bossRound=false,speechReady=false,voiceList=[];
const $=id=>document.getElementById(id);
function unlockSpeech(){
  if(!('speechSynthesis' in window)) return;
  voiceList=window.speechSynthesis.getVoices();
  if(speechReady) return;
  try{const u=new SpeechSynthesisUtterance('');u.lang='en-US';u.volume=0;window.speechSynthesis.speak(u);speechReady=true;}catch(e){}
}
if('speechSynthesis' in window){window.speechSynthesis.onvoiceschanged=()=>{voiceList=window.speechSynthesis.getVoices();};}
['touchstart','click','keydown'].forEach(evt=>document.addEventListener(evt,unlockSpeech,{once:true,passive:true}));
function startGame(selected){unlockSpeech();mode=selected;score=0;wrongCount=0;combo=0;levelIndex=1;stage=1;rinaHP=100;$('answer').disabled=false;$('score').textContent=score;$('menu').classList.remove('active');$('game').classList.add('active');$('comboText').textContent='';if(mode==='level'){$('modeName').textContent='Adventure Mode';$('prompt').textContent='看数字，写英文';$('battleArea').style.display='none';$('stagePill').style.display='none';current=1;}else{$('modeName').textContent='Monster Battle';$('prompt').textContent='输入英文，攻击数字怪物！';$('battleArea').style.display='grid';$('stagePill').style.display='block';newMonster();}renderPath();renderQuestion();setSpeech('Rina is ready! 加油！');}
function goMenu(){$('game').classList.remove('active');$('menu').classList.add('active');if('speechSynthesis'in window) speechSynthesis.cancel();}
function randomNumber(){let max=stage<=1?5:stage===2?10:stage===3?15:20;return Math.floor(Math.random()*max)+1;}
function renderPath(){const path=$('path');path.innerHTML='';path.style.display=mode==='level'?'grid':'none';if(mode!=='level')return;for(let i=1;i<=20;i++){const div=document.createElement('div');div.className='step'+(i<levelIndex?' done':'');div.textContent=i;path.appendChild(div);}}
function newMonster(){bossRound=stage%4===0;monsterMaxHP=bossRound?5+stage:2+stage;monsterHP=monsterMaxHP;current=randomNumber();$('stage').textContent=stage;$('monsterName').textContent=bossRound?'Boss Monster':'Number Monster';$('monsterIcon').textContent=bossRound?'🐉':'👾';$('monsterIcon').className='monster'+(bossRound?' boss':'');updateBattleUI();setSpeech(bossRound?'Boss is here! Be brave!':'A monster appeared!');}
function updateBattleUI(){$('rinaHp').style.width=Math.max(0,rinaHP)+'%';$('rinaHpText').textContent=Math.max(0,rinaHP)+'/100';$('monsterHp').style.width=Math.max(0,monsterHP/monsterMaxHP*100)+'%';$('monsterHpText').textContent=Math.max(0,monsterHP)+'/'+monsterMaxHP;$('comboText').textContent=combo>1?'Combo x'+combo+' 🔥':'';}
function renderQuestion(){$('numberBox').textContent=current;$('answer').value='';$('feedback').textContent='';setTimeout(()=>$('answer').focus(),60);updateBattleUI();}
function normalize(s){return(s||'').trim().toLowerCase().replace(/[^a-z]/g,'');}
function checkAnswer(){const user=normalize($('answer').value);const correct=words[current];if(!user)return;if(user===correct){score++;combo++;wrongCount=0;$('score').textContent=score;popStars(combo>=3?16:9);rinaAnim('attack');$('monsterIcon').classList.add('hit');setTimeout(()=>$('monsterIcon').classList.remove('hit'),350);speakText(combo>=3?'Super combo!':'Great job!');if(mode==='monster'){let damage=combo>=3?2:1;monsterHP-=damage;$('feedback').textContent='✅ Correct! '+current+' = '+correct+'  Attack -'+damage;if(monsterHP<=0){score+=bossRound?5:2;$('score').textContent=score;$('feedback').textContent=bossRound?'🎉 Boss defeated! Stage Clear!':'✨ Monster defeated! Next stage!';setSpeech(bossRound?'You defeated the Boss!':'Monster defeated!');setTimeout(()=>{stage++;newMonster();renderQuestion();},1000);}else{current=randomNumber();setSpeech('Nice attack! Keep going!');setTimeout(renderQuestion,650);}}else{$('feedback').textContent='✅ Great Job! '+current+' = '+correct;setSpeech('Great job! '+correct+'!');setTimeout(()=>{levelIndex++;if(levelIndex>20){$('feedback').textContent='🎉 Stage Clear! You finished 1 to 20!';setSpeech('Stage Clear! You are amazing!');popStars(22);speakText('Stage clear! You are amazing!');levelIndex=1;current=1;}else current=levelIndex;renderPath();renderQuestion();},700);}}else{wrongCount++;combo=0;if(mode==='monster'){rinaHP-=bossRound?18:12;rinaAnim('hurt');$('feedback').textContent='❌ Monster attacks! 再试一次';setSpeech('Try again. Rina needs your help!');speakText('Try again');if(rinaHP<=0){$('feedback').textContent='Game Over. 按首页再挑战一次 💪';setSpeech('It is okay. Try again!');$('answer').disabled=true;}}else{$('feedback').textContent=wrongCount>=2?'提示：开头是 “'+correct[0]+'”':'再试一次 💪';setSpeech('Try again. You can do it!');speakText('Try again');}updateBattleUI();}}
function showHint(){const correct=words[current];let hint=correct.split('').map((ch,i)=>i===0||i===correct.length-1?ch:'_').join(' ');$('feedback').textContent='提示：'+hint;setSpeech('Hint: starts with '+correct[0].toUpperCase());}
function speakCurrent(){speakText(words[current]);}
function speakText(text){if(!('speechSynthesis'in window)){$('feedback').textContent='这个浏览器不支持语音。请用 Safari / Chrome 新版本。';return;}unlockSpeech();window.speechSynthesis.cancel();voiceList=window.speechSynthesis.getVoices();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.68;u.pitch=1.08;u.volume=1;const enVoice=voiceList.find(v=>/en[-_](US|GB|AU)/i.test(v.lang))||voiceList.find(v=>/^en/i.test(v.lang));if(enVoice)u.voice=enVoice;setTimeout(()=>window.speechSynthesis.speak(u),50);}
function setSpeech(text){$('rinaSpeech').textContent=text;}
function rinaAnim(cls){const img=$('rinaImg');img.classList.remove('attack','hurt');void img.offsetWidth;img.classList.add(cls);setTimeout(()=>img.classList.remove(cls),500);}
function popStars(count=10){const box=$('stars');for(let i=0;i<count;i++){const s=document.createElement('div');s.className='star';s.textContent=['✨','⭐','💖','🌟'][Math.floor(Math.random()*4)];s.style.left=Math.random()*100+'vw';s.style.top=(45+Math.random()*40)+'vh';s.style.animationDelay=(Math.random()*150)+'ms';box.appendChild(s);setTimeout(()=>s.remove(),1050);}}
</script>
</body>
</html>
