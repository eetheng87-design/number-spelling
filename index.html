<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rina Number Magic 1-20</title>
  <style>
    :root{--pink:#ff5ad9;--purple:#7b2cff;--deep:#120018;--blue:#49d8ff;--gold:#ffd166;--white:#fff7ff;--danger:#ff4d6d;--green:#77ffb7;}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:"Trebuchet MS","Arial Rounded MT Bold",system-ui,sans-serif;color:var(--white);overflow:hidden;background:radial-gradient(circle at 20% 15%,rgba(255,91,217,.55),transparent 25%),radial-gradient(circle at 80% 18%,rgba(73,216,255,.35),transparent 28%),radial-gradient(circle at 50% 100%,rgba(123,44,255,.6),transparent 45%),linear-gradient(135deg,#120018 0%,#241147 42%,#060012 100%)}
    body::before{content:"";position:fixed;inset:0;background:linear-gradient(100deg,transparent 0 40%,rgba(255,255,255,.13) 48%,transparent 57%),repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0 2px,transparent 2px 68px);pointer-events:none;animation:lights 8s ease-in-out infinite alternate}@keyframes lights{from{filter:hue-rotate(0deg);opacity:.75}to{filter:hue-rotate(25deg);opacity:1}}
    .app{width:min(1120px,100vw);height:100vh;margin:auto;padding:18px;display:grid;grid-template-columns:1fr 330px;gap:16px;position:relative;z-index:1}.panel{border:1px solid rgba(255,255,255,.25);background:linear-gradient(160deg,rgba(255,255,255,.18),rgba(255,255,255,.07));backdrop-filter:blur(14px);border-radius:28px;box-shadow:0 25px 70px rgba(0,0,0,.35),inset 0 0 35px rgba(255,255,255,.08)}
    .main{padding:22px;display:flex;flex-direction:column;min-width:0}.hero{position:relative;overflow:hidden;display:flex;align-items:end;justify-content:center;padding:8px}.rina{width:100%;max-height:82vh;object-fit:cover;border-radius:24px;filter:drop-shadow(0 0 25px rgba(255,90,217,.45));animation:floaty 3.2s ease-in-out infinite}.rina.attack{animation:attack .38s ease-in-out 1}.rina.hurt{animation:hurt .45s ease-in-out 1}@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes attack{0%{transform:translateX(0)}45%{transform:translateX(-22px) scale(1.03)}100%{transform:translateX(0)}}@keyframes hurt{0%,100%{filter:drop-shadow(0 0 25px rgba(255,90,217,.45))}50%{filter:drop-shadow(0 0 35px rgba(255,77,109,.95)) brightness(1.25)}}
    .speech{position:absolute;left:18px;right:18px;bottom:18px;background:rgba(20,0,38,.72);border:1px solid rgba(255,255,255,.25);padding:12px 14px;border-radius:20px;font-weight:800;text-shadow:0 0 12px var(--pink)}h1{margin:0;font-size:clamp(32px,5vw,60px);line-height:1;text-shadow:0 0 14px var(--pink),0 0 36px var(--purple)}.subtitle{font-size:18px;opacity:.92;margin:10px 0 0}.screen{display:none;height:100%}.screen.active{display:flex;flex-direction:column}.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:32px}.mode{padding:26px 18px;min-height:170px;border-radius:24px;border:1px solid rgba(255,255,255,.22);background:linear-gradient(145deg,rgba(255,90,217,.24),rgba(73,216,255,.13));color:white;cursor:pointer;text-align:left;box-shadow:0 15px 35px rgba(0,0,0,.2);transition:.15s transform,.15s filter}.mode:hover,.mode:active{transform:translateY(-4px) scale(1.01);filter:brightness(1.1)}.mode .emoji{font-size:46px;display:block}.mode b{font-size:26px;display:block;margin:10px 0}.mode span{font-size:16px;opacity:.9}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}.pill{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);font-weight:900;white-space:nowrap}.question-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;min-height:0}.question-label{font-size:22px;opacity:.95}.big-number{width:min(290px,70vw);height:min(205px,27vh);border-radius:34px;display:grid;place-items:center;font-size:clamp(86px,17vw,165px);font-weight:1000;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.38),transparent 26%),linear-gradient(140deg,rgba(255,90,217,.65),rgba(123,44,255,.8),rgba(73,216,255,.45));border:2px solid rgba(255,255,255,.34);box-shadow:0 0 35px rgba(255,90,217,.45),inset 0 0 35px rgba(255,255,255,.13);text-shadow:0 0 18px rgba(255,255,255,.7)}
    input{width:min(520px,92%);font-size:clamp(25px,5vw,40px);text-align:center;padding:15px 18px;border-radius:24px;border:2px solid rgba(255,255,255,.3);outline:none;color:white;background:rgba(0,0,0,.28);box-shadow:inset 0 0 20px rgba(255,255,255,.08);font-weight:900;text-transform:lowercase}input:focus{border-color:var(--pink);box-shadow:0 0 22px rgba(255,90,217,.45)}.buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}button{border:0;border-radius:999px;padding:14px 20px;font-size:17px;font-weight:900;color:white;background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 12px 30px rgba(0,0,0,.24),0 0 18px rgba(255,90,217,.28);cursor:pointer}button.secondary{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25)}button.gold{background:linear-gradient(135deg,#ffd166,#ff7ac8);color:#2b033e}.feedback{min-height:44px;font-size:24px;font-weight:1000;text-shadow:0 0 14px var(--pink)}.path{display:grid;grid-template-columns:repeat(10,1fr);gap:7px;width:100%;max-width:680px;margin:0 auto 8px}.step{border-radius:14px;padding:8px 2px;text-align:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);font-weight:900;font-size:14px}.step.done{background:linear-gradient(135deg,var(--gold),var(--pink));color:#2b033e}.battle-area{display:none;width:100%;max-width:720px;gap:12px;align-items:center;justify-content:space-between}.fighter{flex:1;min-width:180px;padding:12px;border-radius:22px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.18)}.fighter-title{display:flex;justify-content:space-between;font-weight:1000;margin-bottom:8px}.hpbar{height:18px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden;border:1px solid rgba(255,255,255,.2)}.hp{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--gold));transition:.25s width}.hp.monsterhp{background:linear-gradient(90deg,var(--danger),var(--pink))}.monster-big{font-size:78px;filter:drop-shadow(0 0 22px rgba(73,216,255,.45))}.monster-big.hit{animation:monsterHit .35s ease-in-out 1}.monster-big.boss{font-size:92px;filter:drop-shadow(0 0 28px rgba(255,77,109,.65))}@keyframes monsterHit{0%{transform:scale(1)}40%{transform:scale(.82) rotate(-8deg);filter:brightness(1.6)}100%{transform:scale(1)}}.combo{font-size:24px;font-weight:1000;color:var(--gold);min-height:28px;text-shadow:0 0 12px var(--pink)}.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}.star{position:absolute;animation:pop 900ms ease-out forwards;font-size:28px}@keyframes pop{0%{transform:translateY(0) scale(.4);opacity:0}20%{opacity:1}100%{transform:translateY(-140px) scale(1.4) rotate(40deg);opacity:0}}
    @media(max-width:1024px){
      body{height:100dvh;overflow:hidden;-webkit-text-size-adjust:100%}
      .app{width:100vw;height:100dvh;grid-template-columns:1fr 150px;padding:8px;gap:8px}
      .main{padding:10px;border-radius:20px;min-height:0;overflow:hidden}
      .hero{padding:6px;border-radius:20px;align-items:end}
      .rina{height:calc(100dvh - 28px);max-height:none;width:100%;object-fit:cover;object-position:center top;border-radius:16px}
      .speech{left:6px;right:6px;bottom:6px;padding:8px 9px;border-radius:14px;font-size:12px;line-height:1.2}
      h1{font-size:clamp(26px,5vw,46px)}.subtitle{font-size:14px;margin-top:6px}.menu-grid{gap:10px;margin-top:14px}.mode{min-height:120px;padding:16px}.mode .emoji{font-size:32px}.mode b{font-size:21px}.mode span{font-size:14px}
      .topbar{gap:6px;margin-bottom:6px}.pill{padding:7px 9px;font-size:13px}button{padding:10px 13px;font-size:14px}.question-wrap{gap:7px;justify-content:flex-start}.question-label{font-size:16px}.battle-area{display:flex;gap:7px;max-width:100%;align-items:center}.fighter{min-width:0;padding:8px;border-radius:16px}.fighter-title{font-size:12px;margin-bottom:5px}.hpbar{height:12px}.monster-big{font-size:46px}.monster-big.boss{font-size:52px}.combo{font-size:18px;min-height:20px}.big-number{width:min(210px,45vw);height:120px;border-radius:24px;font-size:clamp(62px,12vw,106px)}
      input{width:min(430px,90%);font-size:28px;padding:10px 12px;border-radius:18px}.buttons{gap:7px}.feedback{min-height:32px;font-size:18px;line-height:1.2}.path{grid-template-columns:repeat(10,1fr);gap:4px;margin-bottom:4px}.step{font-size:11px;padding:5px 1px;border-radius:8px}
    }
    @media(max-width:720px){
      body{overflow:auto}.app{height:auto;min-height:100dvh;grid-template-columns:1fr;padding:8px}.hero{display:none}.main{min-height:100dvh}.menu-grid{grid-template-columns:1fr}.battle-area{flex-direction:row}.fighter-title{font-size:11px}.monster-big{font-size:40px}.big-number{height:105px}.topbar{justify-content:center}.path{grid-template-columns:repeat(5,1fr)}
    }
    @media(max-height:760px) and (min-width:721px){
      .rina{height:calc(100dvh - 24px)}.main{padding:8px}.big-number{height:96px;font-size:78px}.monster-big{font-size:40px}.monster-big.boss{font-size:46px}input{font-size:24px;padding:8px 10px}.buttons button{padding:8px 11px}.feedback{font-size:16px;min-height:26px}.combo{font-size:16px;min-height:18px}.question-wrap{gap:5px}.topbar{margin-bottom:4px}.fighter{padding:6px}.hpbar{height:10px}
    }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <main class="main panel">
    <section id="menu" class="screen active">
      <div><h1>Rina Number Magic</h1><p class="subtitle">看数字 1–20，写出英文拼音。现在只有两个模式：闯关和打怪。</p></div>
      <div class="menu-grid">
        <button class="mode" onclick="startGame('level')"><span class="emoji">⭐</span><b>Adventure Mode</b><span>从 1 到 20 顺序闯关，答对才能前进。</span></button>
        <button class="mode" onclick="startGame('monster')"><span class="emoji">👾</span><b>Monster Battle</b><span>随机数字怪物、有血条、Combo、提示和 Boss 关。</span></button>
      </div>
      <p class="subtitle">答案例子：1 = one，8 = eight，15 = fifteen，20 = twenty。</p>
    </section>
    <section id="game" class="screen">
      <div class="topbar"><button class="secondary" onclick="goMenu()">← 回首页</button><div class="pill" id="modeName">Adventure Mode</div><div class="pill">⭐ <span id="score">0</span></div><div class="pill" id="stagePill" style="display:none">Stage <span id="stage">1</span></div></div>
      <div class="path" id="path"></div>
      <div class="question-wrap">
        <div class="battle-area" id="battleArea">
          <div class="fighter"><div class="fighter-title"><span>Rina</span><span id="rinaHpText">100/100</span></div><div class="hpbar"><div class="hp" id="rinaHp"></div></div></div>
          <div class="monster-big" id="monsterIcon">👾</div>
          <div class="fighter"><div class="fighter-title"><span id="monsterName">Monster</span><span id="monsterHpText">3/3</span></div><div class="hpbar"><div class="hp monsterhp" id="monsterHp"></div></div></div>
        </div>
        <div class="combo" id="comboText"></div>
        <div class="question-label" id="prompt">这个数字的英文是什么？</div>
        <div class="big-number" id="numberBox">1</div>
        <input id="answer" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="type English here" onkeydown="if(event.key==='Enter') checkAnswer()" />
        <div class="buttons"><button onclick="speakCurrent()">🔊 听一听</button><button class="gold" onclick="checkAnswer()">提交答案</button><button class="secondary" onclick="showHint()">提示</button></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </section>
  </main>
  <aside class="hero panel"><img id="rinaImg" class="rina" src="rina-happy.jpg" alt="Rina happy character"><div class="speech" id="rinaSpeech">Hi! Ready? Let’s learn numbers!</div></aside>
</div>
<script>
const words={1:'one',2:'two',3:'three',4:'four',5:'five',6:'six',7:'seven',8:'eight',9:'nine',10:'ten',11:'eleven',12:'twelve',13:'thirteen',14:'fourteen',15:'fifteen',16:'sixteen',17:'seventeen',18:'eighteen',19:'nineteen',20:'twenty'};
let mode='level',current=1,score=0,levelIndex=1,wrongCount=0,stage=1,combo=0,rinaHP=100,monsterHP=3,monsterMaxHP=3,bossRound=false,speechReady=false,voiceList=[];
const $=id=>document.getElementById(id);
function unlockSpeech(){
  if(!('speechSynthesis' in window)) return;
  voiceList=window.speechSynthesis.getVoices();
  if(speechReady) return;
  const u=new SpeechSynthesisUtterance('');
  u.lang='en-US'; u.volume=0;
  window.speechSynthesis.speak(u);
  speechReady=true;
}
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged=()=>{voiceList=window.speechSynthesis.getVoices();};
}
['touchstart','click','keydown'].forEach(evt=>document.addEventListener(evt,unlockSpeech,{once:true,passive:true}));
function startGame(selected){unlockSpeech();mode=selected;score=0;wrongCount=0;combo=0;levelIndex=1;stage=1;rinaHP=100;$('answer').disabled=false;document.body.classList.toggle('battle-mode',selected==='monster');$('score').textContent=score;$('menu').classList.remove('active');$('game').classList.add('active');$('comboText').textContent='';if(mode==='level'){ $('modeName').textContent='Adventure Mode';$('prompt').textContent='从 1 到 20 闯关';$('battleArea').style.display='none';$('stagePill').style.display='none';current=1;}else{ $('modeName').textContent='Monster Battle';$('prompt').textContent='输入英文，攻击数字怪物！';$('battleArea').style.display='flex';$('stagePill').style.display='block';newMonster();}renderPath();renderQuestion();setSpeech('Rina is ready! 加油！');}
function goMenu(){$('game').classList.remove('active');$('menu').classList.add('active');document.body.classList.remove('battle-mode');if('speechSynthesis'in window) speechSynthesis.cancel();}
function randomNumber(){let max=stage<=1?5:stage===2?10:stage===3?15:20;return Math.floor(Math.random()*max)+1;}
function renderPath(){const path=$('path');path.innerHTML='';for(let i=1;i<=20;i++){const div=document.createElement('div');div.className='step'+((mode==='level'&&i<levelIndex)?' done':'');div.textContent=i;path.appendChild(div);}path.style.display=mode==='level'?'grid':'none';}
function newMonster(){bossRound=stage%4===0;monsterMaxHP=bossRound?5+stage:2+stage;monsterHP=monsterMaxHP;current=randomNumber();$('stage').textContent=stage;$('monsterName').textContent=bossRound?'Boss Monster':'Number Monster';$('monsterIcon').textContent=bossRound?'🐉':'👾';$('monsterIcon').className='monster-big'+(bossRound?' boss':'');updateBattleUI();setSpeech(bossRound?'Boss is here! Be brave!':'A monster appeared!');}
function updateBattleUI(){$('rinaHp').style.width=Math.max(0,rinaHP)+'%';$('rinaHpText').textContent=Math.max(0,rinaHP)+'/100';$('monsterHp').style.width=Math.max(0,monsterHP/monsterMaxHP*100)+'%';$('monsterHpText').textContent=Math.max(0,monsterHP)+'/'+monsterMaxHP;$('comboText').textContent=combo>1?'Combo x'+combo+' 🔥':'';}
function renderQuestion(){$('numberBox').textContent=current;$('answer').value='';$('feedback').textContent='';$('answer').focus();updateBattleUI();}
function normalize(s){return(s||'').trim().toLowerCase().replace(/[^a-z]/g,'');}
function checkAnswer(){const user=normalize($('answer').value);const correct=words[current];if(!user)return; if(user===correct){score++;combo++;wrongCount=0;$('score').textContent=score;popStars(combo>=3?16:9);rinaAnim('attack');$('monsterIcon').classList.add('hit');setTimeout(()=>$('monsterIcon').classList.remove('hit'),360);speakText(combo>=3?'Super combo!':'Great job!'); if(mode==='monster'){let damage=combo>=3?2:1;monsterHP-=damage;$('feedback').textContent='✅ Correct! '+current+' = '+correct+'  攻击 -'+damage; if(monsterHP<=0){score+=bossRound?5:2;$('score').textContent=score;stage++;$('feedback').textContent=bossRound?'🎉 Boss defeated! Stage Clear!':'✨ Monster defeated! Next stage!';setSpeech(bossRound?'You defeated the Boss!':'Monster defeated!');setTimeout(()=>{newMonster();renderQuestion();},1200);}else{current=randomNumber();setSpeech('Nice attack! Keep going!');setTimeout(renderQuestion,850);} } else { $('feedback').textContent='✅ Great Job! '+current+' = '+correct; setSpeech('Great job! '+correct+'!'); setTimeout(()=>{levelIndex++; if(levelIndex>20){$('feedback').textContent='🎉 Stage Clear! You finished 1 to 20!';setSpeech('Stage Clear! You are amazing!');popStars(22);speakText('Stage clear! You are amazing!');levelIndex=1;current=1;}else current=levelIndex;renderPath();renderQuestion();},900);} } else {wrongCount++;combo=0;if(mode==='monster'){rinaHP-=bossRound?18:12;rinaAnim('hurt');$('feedback').textContent='❌ Monster attacks! 再试一次';setSpeech('Try again. Rina needs your help!');speakText('Try again'); if(rinaHP<=0){$('feedback').textContent='Game Over. 按回首页再挑战一次 💪';setSpeech('It is okay. Try again!');$('answer').disabled=true;setTimeout(()=>{$('answer').disabled=false;},1000);} } else {$('feedback').textContent=wrongCount>=2?'提示：开头是 “'+correct[0]+'”':'再试一次 💪';setSpeech('Try again. You can do it!');speakText('Try again');}updateBattleUI();}}
function showHint(){const correct=words[current];let hint=correct.split('').map((ch,i)=>i===0||i===correct.length-1?ch:'_').join(' ');$('feedback').textContent='提示：'+hint;setSpeech('Hint: starts with '+correct[0].toUpperCase());}
function speakCurrent(){speakText(words[current]);}
function speakText(text){
  if(!('speechSynthesis'in window)){$('feedback').textContent='这个浏览器不支持语音。可以用 Safari / Chrome 新版本试试看。';return;}
  unlockSpeech();
  window.speechSynthesis.cancel();
  voiceList=window.speechSynthesis.getVoices();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=.68;u.pitch=1.08;u.volume=1;
  const enVoice=voiceList.find(v=>/en[-_](US|GB)/i.test(v.lang))||voiceList.find(v=>/^en/i.test(v.lang));
  if(enVoice) u.voice=enVoice;
  setTimeout(()=>window.speechSynthesis.speak(u),40);
}
function setSpeech(text){$('rinaSpeech').textContent=text;}
function rinaAnim(cls){const img=$('rinaImg');img.classList.remove('attack','hurt');void img.offsetWidth;img.classList.add(cls);setTimeout(()=>img.classList.remove(cls),480);}
function popStars(count=10){const box=$('stars');for(let i=0;i<count;i++){const s=document.createElement('div');s.className='star';s.textContent=['✨','⭐','💖','🌟'][Math.floor(Math.random()*4)];s.style.left=Math.random()*100+'vw';s.style.top=(45+Math.random()*45)+'vh';s.style.animationDelay=(Math.random()*160)+'ms';box.appendChild(s);setTimeout(()=>s.remove(),1100);}}
</script>
</body>
</html>
